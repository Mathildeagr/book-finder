<!-- Hero -->
<div class="hero text-center py-5 mb-5">
  <i class="bi bi-book-half display-1 text-primary mb-3 d-block"></i>
  <h1 class="display-4 fw-bold">Bienvenue sur <span class="text-primary">BookFinder</span></h1>
  <p class="lead text-muted mb-4">Explorez des millions de livres grâce à la bibliothèque ouverte OpenLibrary.</p>
  <a routerLink="/search" class="btn btn-primary btn-lg px-5 shadow">
    <i class="bi bi-search me-2"></i>Lancer une recherche
  </a>
</div>

<!-- Features -->
<div class="row g-4 mb-5">
  @for (feature of features; track feature.title) {
    <div class="col-md-4">
      <div class="card text-center border-0 shadow-sm h-100 p-4">
        <i class="bi {{ feature.icon }} fs-1 text-primary mb-3"></i>
        <h5 class="fw-bold">{{ feature.title }}</h5>
        <p class="text-muted">{{ feature.desc }}</p>
      </div>
    </div>
  }
</div>

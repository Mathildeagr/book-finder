<div class="card h-100 book-card shadow-sm">
  <a [routerLink]="['/book', workId]" class="text-decoration-none">
    <div class="cover-wrapper">
      <img
        [src]="coverUrl"
        [alt]="book.title"
        class="card-img-top book-cover"
        loading="lazy"
        (error)="$any($event.target).src='assets/no-cover.png'"
      />
      <div class="cover-overlay">
        <span class="badge bg-primary">Voir le détail</span>
      </div>
    </div>
  </a>

  <div class="card-body d-flex flex-column">
    <h6 class="card-title fw-bold mb-1">
      <a [routerLink]="['/book', workId]" class="text-dark text-decoration-none stretched-link-title">
        {{ book.title | truncate:60 }}
      </a>
    </h6>

    <p class="text-muted small mb-1" *ngIf="book.author_name?.length">
      <i class="bi bi-person me-1"></i>
      {{ book.author_name![0] | truncate:40 }}
    </p>

    <p class="text-muted small mb-2" *ngIf="book.first_publish_year">
      <i class="bi bi-calendar me-1"></i>
      {{ book.first_publish_year }}
    </p>

    <div class="mt-auto d-flex justify-content-between align-items-center">
      <a [routerLink]="['/book', workId]" class="btn btn-sm btn-outline-primary">
        <i class="bi bi-book me-1"></i>Détails
      </a>
      <button
        class="btn btn-sm"
        [class.btn-warning]="isFavorite"
        [class.btn-outline-warning]="!isFavorite"
        (click)="toggleFavorite($event)"
        [title]="isFavorite ? 'Retirer des favoris' : 'Ajouter aux favoris'"
      >
        <i class="bi" [class.bi-star-fill]="isFavorite" [class.bi-star]="!isFavorite"></i>
      </button>
    </div>
  </div>
</div>
